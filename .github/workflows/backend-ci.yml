name: Backend CI

on:
  push:
    paths:
      - '02-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - '02-backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Create application.properties from template
        working-directory: 02-backend/spring-boot-ecommerce/src/main/resources
        run: |
          cp application.properties.template application.properties
          sed -i 's/YOUR_DB_USERNAME/ci_user/' application.properties
          sed -i 's/YOUR_DB_PASSWORD/ci_password/' application.properties
          sed -i 's/YOUR_AUTH0_DOMAIN/dev-placeholder.auth0.com/' application.properties
          sed -i 's/YOUR_AUTH0_CLIENT_ID/placeholder_client_id/' application.properties

      - name: Run tests with coverage check
        working-directory: 02-backend/spring-boot-ecommerce
        env:
          ANTHROPIC_API_KEY: test-key-not-used-in-unit-tests
        run: mvn --no-transfer-progress test

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: 02-backend/spring-boot-ecommerce/target/site/jacoco/
