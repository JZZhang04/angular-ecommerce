name: Frontend CI

on:
  push:
    paths:
      - '03-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - '03-frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: 03-frontend/angular-ecommerce/package-lock.json

      - name: Create app config from template
        working-directory: 03-frontend/angular-ecommerce/src/app/config
        run: cp my-app-config.ts.template my-app-config.ts

      - name: Install dependencies
        working-directory: 03-frontend/angular-ecommerce
        run: npm ci

      - name: Build
        working-directory: 03-frontend/angular-ecommerce
        run: npm run build
